server:
  port: ${PORT:8081}

spring:
  datasource:
    platform: postgres
    url: ${SPRING_DATASOURCE_URL}
    driverClassName: org.postgresql.Driver

  sql:
    init:
      mode: never
      schema-locations: classpath:schema-postgresql.sql
      continue-on-error: true

logging:
  level:
    org.springframework: DEBUG
