<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link th:href="@{/estilo.css}" rel="stylesheet">
    <link rel="icon" type="image/x-icon" th:href="@{/img/favicon.ico}">
    <title>game.log - Editar Jogo</title>
</head>

<body class="fundoprincipal text-white">
    <header>
        <nav class="navbar navbar-expand-lg fundonav shadow-lg">
            <div class="container-fluid">
                <a class="navbar-brand" href="/jogos">
                    <img th:src="@{/img/logogamelog.png}" alt="Logo" width="120px">
                </a>
            </div>
        </nav>
    </header>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card bg-dark border-0 shadow-lg text-white">
                    <div class="card-header border-secondary p-3">
                        <h4 class="m-0">Editar Jogo</h4>
                    </div>
                    <form th:action="@{/jogos/atualizar/{id}(id=${jogo.id})}" th:object="${jogo}" method="POST">
                        <div class="card-body">

                            <div class="mb-3">
                                <label class="form-label">Nome do Jogo</label>
                                <input type="text" th:field="*{nomeJogo}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Plataforma</label>
                                <input type="text" th:field="*{plataforma}" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Descrição</label>
                                <textarea th:field="*{descricao}" class="form-control" rows="4"></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nota (0.0 a 10.0)</label>
                                    <input type="number" step="0.1" min="0" max="10" th:field="*{nota}" class="form-control">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Status</label>
                                    <select th:field="*{estadoJogo}" class="form-select" required>
                                        <option th:each="est : ${estados}" th:value="${est}" th:text="${est}"></option>
                                    </select>
                                </div>
                            </div>

                        </div>
                        <div class="card-footer border-secondary d-flex justify-content-end gap-2 p-3">
                            <a href="/jogos" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary fw-bold">Salvar Alterações</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
